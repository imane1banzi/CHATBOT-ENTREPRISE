<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Chatbot Support</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#343541] text-white h-screen flex">

  <!-- Sidebar -->
  <div class="w-64 bg-[#202123] p-4 hidden md:block">
    <h2 class="text-lg font-bold mb-4">🤖 Support IT</h2>

    <button onclick="newChat()"
            class="w-full bg-[#343541] p-2 rounded hover:bg-gray-700">
      + Nouvelle discussion
    </button>
  </div>

  <!-- Main -->
  <div class="flex-1 flex flex-col">

    <!-- Messages -->
    <div id="chat" class="flex-1 overflow-y-auto p-6 space-y-4"></div>

    <!-- Input -->
    <div class="p-4 bg-[#40414f] flex">
      <input id="message"
             class="flex-1 p-3 rounded bg-[#343541] outline-none"
             placeholder="Pose ta question..."
             onkeypress="handleKeyPress(event)" />

      <button onclick="sendMessage()"
              class="ml-3 bg-green-500 px-4 py-2 rounded hover:bg-green-600">
        Envoyer
      </button>
    </div>

  </div>

<script>
const chat = document.getElementById("chat");

// Ajouter message
function addMessage(text, sender) {
  const div = document.createElement("div");
  div.className = sender === "user" ? "text-right" : "text-left";

  div.innerHTML = `
    <div class="inline-block px-4 py-2 rounded-lg max-w-xl whitespace-pre-line
      ${sender === "user" ? "bg-green-500" : "bg-[#444654]"}">
      ${text}
    </div>
  `;

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

// Envoyer message
async function sendMessage() {
  const input = document.getElementById("message");
  const message = input.value;

  if (!message.trim()) return;

  addMessage(message, "user");
  input.value = "";

  // loader
  const botDiv = document.createElement("div");
  botDiv.className = "text-left";
  botDiv.innerHTML = `
    <div class="inline-block px-4 py-2 rounded-lg bg-[#444654] max-w-xl">
      ...
    </div>
  `;
  chat.appendChild(botDiv);

  try {
    const res = await fetch("/chat", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ message })
    });

    const data = await res.json();

    botDiv.innerHTML = `
      <div class="inline-block px-4 py-2 rounded-lg bg-[#444654] max-w-xl whitespace-pre-line">
        ${data.response}
      </div>
    `;

  } catch (err) {
    botDiv.innerHTML = `
      <div class="inline-block px-4 py-2 rounded-lg bg-red-500 max-w-xl">
        Erreur serveur 😢
      </div>
    `;
  }

  chat.scrollTop = chat.scrollHeight;
}

// Nouvelle discussion
function newChat() {
  if (confirm("Voulez-vous démarrer une nouvelle discussion ?")) {
    chat.innerHTML = "";
  }
}

// Envoyer avec Enter
function handleKeyPress(event) {
  if (event.key === "Enter") {
    sendMessage();
  }
}
</script>

</body>
</html>
